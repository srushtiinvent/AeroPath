<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPath - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
</head>
<body>
    <button id="themeToggle" class="theme-toggle" type="button">🌙</button>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <img src="plane-transparent-cropped.png" alt="AeroPath logo" class="logo-img">
                <span>AeroPath</span>
            </div>
            
            <div id="loginForm" class="form">
                <h1>Login</h1>
                <p class="subtitle">Sign in to your account</p>
                
                <input 
                    type="email" 
                    id="loginEmail" 
                    placeholder="Email address" 
                    class="input-field"
                >
                <input 
                    type="password" 
                    id="loginPassword" 
                    placeholder="Password" 
                    class="input-field"
                >
                
                <div id="loginError" class="error-message"></div>
                
                <button id="loginBtn" class="btn-primary">Login</button>
                
                <p class="toggle-text">
                    Don't have an account? 
                    <a href="#" onclick="switchToSignup(event)">Sign up</a>
                </p>
            </div>

            <div id="signupForm" class="form" style="display: none;">
                <h1>Sign Up</h1>
                <p class="subtitle">Create a new account</p>
                
                <input 
                    type="text" 
                    id="signupName" 
                    placeholder="Full name" 
                    class="input-field"
                >
                <input 
                    type="email" 
                    id="signupEmail" 
                    placeholder="Email address" 
                    class="input-field"
                >
                <input 
                    type="password" 
                    id="signupPassword" 
                    placeholder="Password" 
                    class="input-field"
                >
                <input 
                    type="text" 
                    id="signupTagline" 
                    placeholder="Tagline (e.g., Travel Enthusiast)" 
                    class="input-field"
                >
                
                <div id="signupError" class="error-message"></div>
                
                <button id="signupBtn" class="btn-primary">Sign Up</button>
                
                <p class="toggle-text">
                    Already have an account? 
                    <a href="#" onclick="switchToLogin(event)">Login</a>
                </p>
            </div>

            <div id="dashboard" class="dashboard" style="display: none;">
                <h1>Welcome to AeroPath</h1>
                <p id="userGreeting" class="subtitle"></p>
                
                <div class="dashboard-content">
                    <div class="card">
                        <h3>✈ My Flights</h3>
                        <p>Track your flights</p>
                    </div>
                    <div class="card">
                        <h3>🎫 Boarding Passes</h3>
                        <p>Manage your tickets</p>
                    </div>
                    <div class="card">
                        <h3>📍 Travel Stats</h3>
                        <p>View your journey</p>
                    </div>
                </div>
                
                <button id="logoutBtn" class="btn-secondary">Logout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
